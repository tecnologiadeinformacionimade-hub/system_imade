<!DOCTYPE html>
<html lang="es" class="antialiased">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard de Documentos · Grupo Imade</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- LIBRERÍA OFICIAL DE MICROSOFT PARA AUTENTICACIÓN (MSAL) -->
    <script src="https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js"></script>

    <style>
        /* ==========================================
           CSS BASE (Grupo Imade)
        ========================================== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #F2F2F7;
            --surface: #FFFFFF;
            --surface-2: #F9F9FB;
            --surface-glass: rgba(255, 255, 255, 0.72);
            --border: rgba(0, 0, 0, 0.07);
            --border-mid: rgba(0, 0, 0, 0.10);
            --text: #0A0A0F;
            --text-2: #3C3C43;
            --text-muted: #8E8E93;
            --accent: #0A84FF;
            --accent-hover: #0070E0;
            --accent-soft: rgba(10, 132, 255, 0.08);
            --green: #30D158;
            --green-soft: rgba(48, 209, 88, 0.10);
            --red: #FF453A;
            --red-soft: rgba(255, 69, 58, 0.10);
            --orange: #FF9F0A;
            --orange-soft: rgba(255, 159, 10, 0.10);
            --blue-soft: rgba(10, 132, 255, 0.10);
            
            --header-h: 56px;
            --radius-xs: 8px;
            --radius-sm: 12px;
            --radius-md: 18px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
            --shadow-float: 0 20px 60px rgba(0, 0, 0, 0.14), 0 4px 16px rgba(0, 0, 0, 0.08);
            --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --mono: 'DM Mono', monospace;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.12); border-radius: 4px; }

        #shell { display: flex; height: 100vh; overflow: hidden; }
        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

        /* ==========================================
           LOADER GLOBAL
        ========================================== */
        #globalLoader { position: fixed; inset: 0; z-index: 9999; background: rgba(242, 242, 247, 0.85); backdrop-filter: blur(32px) saturate(180%); -webkit-backdrop-filter: blur(32px) saturate(180%); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s ease, transform 0.6s ease; }
        #globalLoader.fade-out { opacity: 0; pointer-events: none; transform: scale(1.02); }
        .loader-card { background: var(--surface-glass); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.6); border-radius: var(--radius-xl); padding: 36px 44px; display: flex; flex-direction: column; align-items: center; gap: 20px; box-shadow: var(--shadow-float); }
        .loader-ring { width: 44px; height: 44px; border: 3px solid rgba(10, 132, 255, 0.15); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-text { text-align: center; }
        .loader-text strong { display: block; font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.2px; }
        .loader-text span { font-size: 12px; color: var(--text-muted); margin-top: 3px; display: block; }

        /* Header */
        #appHeader {
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: rgba(242, 242, 247, 0.80);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 40;
            position: sticky;
            top: 0;
        }

        .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; }
        .breadcrumb .root { color: var(--text-muted); font-weight: 400; }
        .breadcrumb .sep { color: var(--text-muted); opacity: 0.5; font-size: 11px; }
        .breadcrumb .current { color: var(--text); font-weight: 600; }

        /* Page Content */
        #pageContent { flex: 1; overflow-y: auto; padding: 32px 28px 60px; }
        .page-header { margin-bottom: 32px; text-align: left; }
        .page-title { font-size: 32px; font-weight: 700; letter-spacing: -0.8px; color: var(--text); line-height: 1.1; margin-bottom: 8px; }
        .page-sub { font-size: 15px; color: var(--text-muted); font-weight: 400; max-width: 100%; line-height: 1.5; }

        /* Buttons */
        .btn-pill { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: var(--accent); color: white; border: none; border-radius: 100px; padding: 10px 24px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: var(--font); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 12px rgba(10, 132, 255, 0.25); letter-spacing: -0.2px; text-decoration: none; }
        .btn-pill:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(10, 132, 255, 0.35); color: white; }
        .btn-pill:active { transform: scale(0.98); }

        .btn-primary { display: inline-flex; align-items: center; justify-content: center; gap: 7px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); padding: 11px 22px; font-size: 13.5px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: background 0.15s, transform 0.1s, box-shadow 0.15s; box-shadow: 0 2px 8px rgba(10, 132, 255, 0.25); }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(10, 132, 255, 0.30); }

        .qa-btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 16px; background: var(--surface); border: 1px solid var(--border-mid); border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; color: var(--text-2); cursor: pointer; text-decoration: none; transition: all 0.15s ease; box-shadow: var(--shadow-sm); }
        .qa-btn:hover { background: var(--surface-2); transform: translateY(-1px); box-shadow: var(--shadow-md); }
        .qa-btn.active { background: var(--surface); border-color: var(--accent); color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }

        /* Cards */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); box-shadow: var(--shadow-sm); overflow: hidden; transition: box-shadow 0.3s, opacity 0.3s; margin-bottom: 20px; }
        .card:hover { box-shadow: var(--shadow-md); }
        .card-header { padding: 20px 28px; border-bottom: 1px solid var(--border); background: var(--surface-2); display: flex; align-items: center; gap: 14px; justify-content: space-between; flex-wrap: wrap; }
        .card-header-left { display: flex; align-items: center; gap: 14px; }
        .card-body { padding: 24px 28px; }
        
        /* Elements */
        .status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 100px; font-size: 11.5px; font-weight: 700; letter-spacing: 0.3px; text-transform: uppercase; }
        .status-pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
        .status-pill.pending { background: var(--orange-soft); color: var(--orange); border: 1px solid rgba(255, 159, 10, 0.2); }
        .status-pill.approved { background: var(--green-soft); color: var(--green); border: 1px solid rgba(48, 209, 88, 0.2); }
        .status-pill.rejected { background: var(--red-soft); color: var(--red); border: 1px solid rgba(255, 69, 58, 0.2); }

        .obs-box { background: linear-gradient(135deg, rgba(10, 132, 255, 0.03), rgba(10, 132, 255, 0.01)); border: 1px solid rgba(10, 132, 255, 0.12); border-radius: var(--radius-lg); padding: 18px 24px; margin-bottom: 24px; }
        .obs-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; display: block; }
        .obs-text { font-size: 14px; color: var(--text-2); line-height: 1.6; }

        /* Files Grid */
        .files-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
        .file-item { display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px 16px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); text-decoration: none; }
        .file-item:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(10, 132, 255, 0.1); transform: translateY(-2px); }
        .file-item .fi-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-right: 14px; flex-shrink: 0; font-size: 24px; overflow: hidden; background: var(--surface-2); border: 1px solid var(--border-mid); }
        .file-item .fi-icon img { width: 100%; height: 100%; object-fit: cover; }
        .file-item .fi-body { flex: 1; min-width: 0; }
        .file-item .fi-name { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .file-item .fi-link-icon { color: var(--text-muted); margin-left: 10px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: var(--surface-2); border-radius: 8px; transition: all 0.2s; }
        .file-item:hover .fi-link-icon { background: var(--accent-soft); color: var(--accent); }

        /* Empty State */
        .empty-state { padding: 64px 24px; text-align: center; background: var(--surface); border: 2px dashed var(--border-mid); border-radius: var(--radius-xl); margin-top: 20px; }
        .empty-state i { font-size: 56px; color: var(--text-muted); margin-bottom: 16px; opacity: 0.5; }
        .empty-state h3 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; letter-spacing: -0.3px; }
        .empty-state p { font-size: 14px; color: var(--text-muted); max-width: 320px; margin: 0 auto; line-height: 1.5; }

        /* Toasts */
        #toastContainer { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 9998; display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none; }
        .toast { display: flex; align-items: center; gap: 10px; padding: 12px 18px; background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(20px); border: 1px solid var(--border-mid); border-radius: 100px; box-shadow: var(--shadow-float); font-size: 13px; font-weight: 600; color: var(--text); pointer-events: auto; transform: translateY(-12px); opacity: 0; transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); white-space: nowrap; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.hide { transform: translateY(-8px); opacity: 0; transition: all 0.25s ease; }
        .toast-icon { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; flex-shrink: 0; }
        .toast-icon.success { background: var(--green); color: white; }
        .toast-icon.error { background: var(--red); color: white; }
        .toast-icon.info { background: var(--accent); color: white; }
        
        .hidden { display: none !important; }
        .opacity-0 { opacity: 0; transform: scale(0.95) translateY(-4px); pointer-events: none; }

        /* Layout */
        .dashboard-container { max-width: 1000px; margin: 0 auto; }

        /* Responsividad */
        @media (max-width: 768px) {
            #appHeader { padding: 0 16px; }
            .breadcrumb { font-size: 13px; }
            .breadcrumb .root { display: none; }
            .breadcrumb .sep { display: none; }
            .btn-pill { padding: 8px 16px; font-size: 13px; gap: 6px; }
            .btn-pill i { font-size: 16px !important; }
            
            #pageContent { padding: 24px 16px 40px; }
            .page-title { font-size: 24px; margin-bottom: 6px; }
            .page-sub { font-size: 13.5px; }
            
            .card-header { padding: 16px; flex-direction: column; align-items: flex-start; gap: 16px; }
            .card-body { padding: 16px; }
            .obs-box { padding: 16px; margin-bottom: 16px; }
            .files-grid { grid-template-columns: 1fr; }
            .card-actions { width: 100%; display: flex; gap: 8px; }
            .card-actions .qa-btn { flex: 1; justify-content: center; }
        }
    </style>
</head>

<body>

    <!-- GLOBAL LOADER -->
    <div id="globalLoader">
        <div class="loader-card">
            <div class="loader-ring"></div>
            <div class="loader-text" id="loaderText">
                <strong>Portal Grupo Imade</strong>
                <span>Verificando autenticación con Microsoft 365...</span>
            </div>
        </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toastContainer"></div>

    <div id="shell">
        <div id="main">
            
            <!-- HEADER -->
            <header id="appHeader">
                <div class="breadcrumb">
                    <span class="root">Portal ERP</span>
                    <span class="sep">›</span>
                    <span class="current">Dashboard de Revisión</span>
                </div>
                <div style="display: flex; gap: 10px; align-items: center;">
                    
                    <a href="inicio.html" class="btn-pill">
                        <i class="ph-bold ph-arrow-left" style="font-size: 18px;"></i> Volver a Inicio
                    </a>

                    <!-- Engranaje de configuraciones (Visible para todos) -->
                    <div style="position: relative;">
                        <button class="qa-btn" onclick="toggleConfigMenu()" title="Configuraciones" style="padding: 10px;">
                            <i class="ph-bold ph-gear" style="font-size: 18px;"></i>
                        </button>
                        
                        <!-- Menú desplegable -->
                        <div id="configMenu" class="hidden opacity-0" style="position: absolute; top: 100%; right: 0; margin-top: 8px; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border: 1px solid var(--border-mid); border-radius: var(--radius-sm); box-shadow: var(--shadow-float); min-width: 240px; z-index: 50; transition: opacity 0.2s, transform 0.2s; transform-origin: top right;">
                            <div style="padding: 6px;">
                                <div style="padding: 8px 12px; border-bottom: 1px solid var(--border); margin-bottom: 6px;">
                                    <span style="font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Configuración</span>
                                </div>
                                <button onclick="attemptLogout()" class="qa-btn" style="width: 100%; justify-content: flex-start; color: var(--red); border: none; box-shadow: none; background: transparent; padding: 10px 12px;">
                                    <i class="ph-bold ph-sign-out" style="font-size: 16px;"></i> Cerrar sesión de Microsoft
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- PAGE CONTENT -->
            <div id="pageContent">
                <div class="dashboard-container">
                    
                    <div class="page-header">
                        <h1 class="page-title">Dashboard de Revisión</h1>
                        <p class="page-sub">Audita, confirma o rechaza las boletas de depósito enviadas. Conectado directamente con SharePoint vía Azure AD.</p>
                    </div>

                    <!-- Pestañas de filtrado -->
                    <div id="filter-tabs" style="display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px;">
                        <button class="qa-btn active" onclick="setFilter('Todas', this)">Todos los elementos</button>
                        <button class="qa-btn" onclick="setFilter('Pendiente', this)">Pendientes</button>
                        <button class="qa-btn" onclick="setFilter('Boleta Confirmada', this)">Boletas Confirmadas</button>
                        <button class="qa-btn" onclick="setFilter('Boleta rechazada', this)">Boletas Rechazadas</button>
                    </div>

                    <!-- Contenedor dinámico de tarjetas -->
                    <div id="dashboard-container">
                        <!-- Las tarjetas o el botón de login se generan vía JavaScript -->
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- ════════════════════════════════════════════════════════════════════
         SCRIPT: CONEXIÓN DIRECTA AZURE AD -> GRAPH API -> SHAREPOINT
         ════════════════════════════════════════════════════════════════════ -->
    <script>
        // 1. CONFIGURACIÓN DE AZURE AD
        const msalConfig = {
            auth: {
                clientId: "b20040c9-f017-4d32-8d9f-b2914465bf1a",
                authority: "https://login.microsoftonline.com/f22a53bd-afee-40ff-ad90-859eb01980fb",
                redirectUri: window.location.href.split('?')[0] 
            },
            cache: {
                cacheLocation: "sessionStorage",
                storeAuthStateInCookie: false,
            }
        };

        // Permisos requeridos
        const tokenRequest = {
            scopes: ["User.Read", "Sites.ReadWrite.All"]
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);

        let accessToken = "";
        let submissions = []; 
        let currentFilter = 'Todas';
        
        // Detalles de SharePoint y Base de datos Google Sheets
        const GRAPH_ENDPOINT = "https://graph.microsoft.com/v1.0";
        const SP_HOSTNAME = "grupoimade.sharepoint.com";
        const SP_SITE_PATH = "/sites/ConfirmacindeDepositosBancarios";
        const SP_LIST_NAME = "Confirmación de Depositos Bancarios";
        
        // Conexión con tu App Script para validar roles
        const GS_API_URL = "https://script.google.com/macros/s/AKfycbzvJayZSV2axjevlHhl-Qiycp55VaTcMuB-3ZTMo0TaL85Ueq4a3mz4Gw6jm-tOHg0Vxg/exec";

        let siteId = "";
        let listId = "";
        let isCurrentUserAdmin = false;

        // ════════════════════════════════════════
        // INICIALIZACIÓN Y LOGIN
        // ════════════════════════════════════════
        async function init() {
            try {
                const response = await msalInstance.handleRedirectPromise();
                const accounts = msalInstance.getAllAccounts();

                if (accounts.length > 0) {
                    msalInstance.setActiveAccount(accounts[0]);
                    await checkPermissionsAndLoad(accounts[0].username);
                } else {
                    showLoginScreen();
                }
            } catch (error) {
                console.error("Error en MSAL:", error);
                showLoginScreen(true);
            }
        }
        
        // FUNCIÓN NUEVA: Valida contra Google Sheets el rol del usuario de Microsoft
        async function checkPermissionsAndLoad(email) {
            document.getElementById('loaderText').innerHTML = "<strong>Portal Grupo Imade</strong><span>Verificando permisos en la Base de Datos...</span>";
            
            try {
                const res = await fetch(GS_API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ accion: 'obtener_usuarios' })
                }).then(r => r.json());
                
                if (res.success) {
                    const dbUser = res.usuarios.find(u => u.correo.toLowerCase() === email.toLowerCase());
                    
                    if (!dbUser) {
                        showLoginScreen(false, `Tu correo de Microsoft (${email}) no está registrado en el ERP.`);
                        return;
                    }
                    
                    // Almacenar globalmente si este usuario es administrador (se usará al intentar cerrar sesión)
                    isCurrentUserAdmin = dbUser.permisos.admin === true;
                    
                    // Prevenir acceso si el usuario no tiene rol de depósitos ni de admin
                    if (dbUser.permisos.depositos !== true && dbUser.permisos.admin !== true) {
                        showLoginScreen(false, "No tienes permisos asignados para entrar al módulo de Depósitos.");
                        return;
                    }
                    
                    document.getElementById('loaderText').innerHTML = "<strong>Portal Grupo Imade</strong><span>Descargando datos de SharePoint...</span>";
                    await acquireTokenAndFetchData();
                } else {
                    showToast('Error al leer usuarios desde la Base de Datos', 'error');
                    removeLoader();
                }
            } catch (error) {
                console.error(error);
                showToast('Error de conexión con Google Sheets', 'error');
                removeLoader();
            }
        }

        function showLoginScreen(hasError = false, customMsg = "") {
            removeLoader();
            const container = document.getElementById('dashboard-container');
            container.innerHTML = `
                <div class="empty-state" style="padding: 80px 20px;">
                    <div style="width: 64px; height: 64px; background: #0A84FF; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; box-shadow: 0 10px 25px rgba(10,132,255,0.3);">
                        <i class="ph-bold ph-microsoft-logo" style="font-size: 32px; color: white;"></i>
                    </div>
                    <h3 style="font-size: 22px;">Conexión Segura con Microsoft 365</h3>
                    <p style="max-width: 400px; margin-bottom: 24px;">Debes autenticarte con tu cuenta corporativa para leer y aprobar los depósitos directamente en SharePoint.</p>
                    
                    ${customMsg ? `<p style="color: var(--red); font-size: 13px; font-weight: 600; margin-bottom: 18px; padding: 10px; background: var(--red-soft); border-radius: 8px;">${customMsg}</p>` : ''}
                    ${hasError ? `<p style="color: var(--red); font-size: 12px; margin-bottom: 15px;">Asegúrate de ejecutar esta página desde la URL registrada en Azure (GitHub Pages).</p>` : ''}
                    
                    <div style="display: flex; gap: 12px; justify-content: center; align-items: center; margin-top: 10px;">
                        <button onclick="loginMicrosoft()" class="btn-primary" style="padding: 14px 32px; font-size: 16px;">
                            Iniciar Sesión
                        </button>
                        ${customMsg ? `
                        <button onclick="logoutMicrosoft()" class="qa-btn" style="color: var(--red); border-color: var(--red-soft); padding: 13px 20px;">
                            Cerrar cuenta actual
                        </button>` : ''}
                    </div>
                </div>
            `;
        }

        function loginMicrosoft() {
            msalInstance.loginRedirect(tokenRequest);
        }
        
        function logoutMicrosoft() {
            msalInstance.logoutRedirect({
                postLogoutRedirectUri: window.location.href.split('?')[0]
            });
        }

        // Mostrar/Ocultar el menú del engranaje
        function toggleConfigMenu() {
            const menu = document.getElementById('configMenu');
            if (menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
                setTimeout(() => menu.classList.remove('opacity-0'), 10);
            } else {
                menu.classList.add('opacity-0');
                setTimeout(() => menu.classList.add('hidden'), 200);
            }
        }

        // Intento de cerrar sesión evaluando el Rol de Google Sheets
        function attemptLogout() {
            toggleConfigMenu(); // Ocultar el menú

            if (isCurrentUserAdmin) {
                // Si es admin, cerramos sesión
                logoutMicrosoft();
            } else {
                // Si no es admin, denegamos el acceso
                showToast("Acceso denegado: Autorización de Administrador requerida para cerrar sesión.", "error");
            }
        }

        // Cerrar menú del engranaje si se hace clic afuera
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('configMenu');
            const gearBtn = menu ? menu.previousElementSibling : null;
            if (menu && !menu.classList.contains('hidden') && !menu.contains(e.target) && !gearBtn.contains(e.target)) {
                menu.classList.add('opacity-0');
                setTimeout(() => menu.classList.add('hidden'), 200);
            }
        });

        async function acquireTokenAndFetchData() {
            try {
                const tokenResponse = await msalInstance.acquireTokenSilent(tokenRequest);
                accessToken = tokenResponse.accessToken;
                await loadSharePointData();
            } catch (error) {
                if (error instanceof msal.InteractionRequiredAuthError) {
                    msalInstance.loginRedirect(tokenRequest);
                } else {
                    console.error("Error obteniendo token:", error);
                    showToast("Error de permisos en Azure", "error");
                    removeLoader();
                }
            }
        }

        // ════════════════════════════════════════
        // LLAMADAS A MICROSOFT GRAPH API
        // ════════════════════════════════════════
        async function loadSharePointData() {
            try {
                let res = await fetch(`${GRAPH_ENDPOINT}/sites/${SP_HOSTNAME}:${SP_SITE_PATH}`, {
                    headers: { "Authorization": `Bearer ${accessToken}` }
                });
                let siteData = await res.json();
                siteId = siteData.id;

                if (!siteId) throw new Error("No se encontró el sitio");

                res = await fetch(`${GRAPH_ENDPOINT}/sites/${siteId}/lists`, {
                    headers: { "Authorization": `Bearer ${accessToken}` }
                });
                let listsData = await res.json();
                
                let list = listsData.value.find(l => l.displayName === SP_LIST_NAME || l.name.includes("Confirmacin"));
                if (!list) list = listsData.value[0]; 
                listId = list.id;

                res = await fetch(`${GRAPH_ENDPOINT}/sites/${siteId}/lists/${listId}/items?expand=fields`, {
                    headers: { 
                        "Authorization": `Bearer ${accessToken}`,
                        "Prefer": "HonorNonIndexedQueriesWarningMayFailRandomly"
                    }
                });
                let itemsData = await res.json();

                submissions = itemsData.value.map(item => {
                    const fields = item.fields;
                    
                    let adjuntos = [];
                    if (fields.Link_x0020_de_x0020_imagen) {
                        adjuntos = [{ name: 'Ver Imagen Adjunta', url: fields.Link_x0020_de_x0020_imagen }];
                    }

                    return {
                        id: item.id,
                        date: fields.Fecha_x0020_y_x0020_Hora || fields.Created || 'Fecha desconocida',
                        status: fields.Estado || 'Pendiente',
                        user: fields.Correo_x0020_Electronico || fields.Author || 'Usuario del Form',
                        observaciones: fields.Observaciones || 'Sin observaciones.',
                        files: adjuntos
                    };
                });

            } catch (e) {
                console.error("Error Graph API:", e);
                showToast('Error conectando con la Base de Datos de SharePoint', 'error');
            } finally {
                removeLoader();
                renderDashboard();
            }
        }

        // ════════════════════════════════════════
        // FILTROS Y RENDERIZADO
        // ════════════════════════════════════════
        function setFilter(status, btnElement) {
            currentFilter = status;
            const tabs = document.getElementById('filter-tabs').querySelectorAll('.qa-btn');
            tabs.forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            renderDashboard();
        }

        function renderDashboard() {
            const container = document.getElementById('dashboard-container');
            
            const filteredSubmissions = submissions.filter(sub => {
                if (currentFilter === 'Todas') return true;
                if (currentFilter === 'Pendiente' && (!sub.status || sub.status === 'Pendiente')) return true;
                return sub.status === currentFilter;
            });

            if (filteredSubmissions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="ph ph-tray"></i>
                        <h3>Bandeja Vacía</h3>
                        <p>No hay boletas que coincidan con los filtros en tu SharePoint.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredSubmissions.map(sub => `
                <div class="card" id="card-${sub.id}">
                    <div class="card-header">
                        <div class="card-header-left">
                            <div style="width: 48px; height: 48px; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--border-mid); display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: var(--shadow-sm);">
                                <i class="ph-fill ph-receipt text-gray-500" style="color: var(--text-muted);"></i>
                            </div>
                            <div>
                                <h3 style="font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px;">
                                    Registro SP-${sub.id}
                                    ${getBadgeHTML(sub.status)}
                                </h3>
                                <p style="font-size: 12.5px; color: var(--text-muted); margin-top: 3px;">
                                    Enviado por <strong style="color: var(--text-2);">${sub.user}</strong> el ${sub.date.replace('T', ' ').substring(0, 16)}
                                </p>
                            </div>
                        </div>
                        
                        <div class="card-actions" style="display:flex; align-items:center; gap:8px;">
                            ${(!sub.status || sub.status === 'Pendiente') ? `
                                <button onclick="changeStatus('${sub.id}', 'Boleta Confirmada')" class="qa-btn" style="color:var(--green); border-color:var(--green-soft);" title="Confirmar Boleta">
                                    <i class="ph-bold ph-check" style="font-size:16px;"></i> Confirmar
                                </button>
                                <button onclick="changeStatus('${sub.id}', 'Boleta rechazada')" class="qa-btn" style="color:var(--red); border-color:var(--red-soft);" title="Rechazar Boleta">
                                    <i class="ph-bold ph-x" style="font-size:16px;"></i> Rechazar
                                </button>
                            ` : `
                                <button onclick="changeStatus('${sub.id}', 'Pendiente')" class="qa-btn" style="font-size: 12px; padding: 6px 12px;" title="Revertir a Pendiente">
                                    <i class="ph ph-arrow-u-up-left" style="font-size:14px;"></i> Deshacer
                                </button>
                            `}
                        </div>
                    </div>
                    
                    <div class="card-body">
                        <div class="obs-box">
                            <span class="obs-label">Observaciones del Usuario</span>
                            <p class="obs-text">${sub.observaciones}</p>
                        </div>

                        <span class="obs-label" style="color: var(--text-2);">Enlaces / Archivos (${sub.files ? sub.files.length : 0})</span>
                        <div class="files-grid">
                            ${(sub.files || []).map(file => `
                                <a href="${file.url || '#'}" target="_blank" class="file-item">
                                    <div class="fi-icon" style="color: var(--blue-soft);">
                                        <img src="${file.url}" alt="Adjunto" onerror="this.src=''; this.parentNode.innerHTML='<i class=\\'ph-fill ph-link\\'></i>'" style="border-radius:8px">
                                    </div>
                                    <div class="fi-body">
                                        <div class="fi-name" title="${file.name}">${file.name}</div>
                                    </div>
                                    <div class="fi-link-icon">
                                        <i class="ph-bold ph-arrow-square-out" style="font-size:16px"></i>
                                    </div>
                                </a>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ════════════════════════════════════════
        // ACTUALIZAR ESTADO EN SHAREPOINT DIRECTO
        // ════════════════════════════════════════
        async function changeStatus(id, newStatus) {
            const index = submissions.findIndex(s => s.id === id);
            if (index === -1) return;

            const card = document.getElementById(`card-${id}`);
            if (card) {
                card.style.opacity = '0.5';
                card.style.pointerEvents = 'none'; 
            }

            try {
                const res = await fetch(`${GRAPH_ENDPOINT}/sites/${siteId}/lists/${listId}/items/${id}/fields`, { 
                    method: 'PATCH', 
                    headers: { 
                        "Authorization": `Bearer ${accessToken}`,
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({ 
                        "Estado": newStatus 
                    }) 
                });

                if (res.ok) {
                    submissions[index].status = newStatus;
                    renderDashboard(); 
                    
                    if (newStatus === 'Boleta Confirmada') showToast(`Actualizado en SharePoint: Confirmada`, 'success');
                    else if (newStatus === 'Boleta rechazada') showToast(`Actualizado en SharePoint: Rechazada`, 'error');
                    else showToast(`Revertido a Pendiente`, 'info');
                } else {
                    const errData = await res.json();
                    console.error("Error PATCH Graph API:", errData);
                    showToast('No tienes permisos de escritura o error en SharePoint', 'error');
                    if (card) { card.style.opacity = '1'; card.style.pointerEvents = 'auto'; }
                }
            } catch (e) {
                console.error(e);
                showToast('Error de conexión con Microsoft 365', 'error');
                if (card) { card.style.opacity = '1'; card.style.pointerEvents = 'auto'; }
            }
        }

        function getBadgeHTML(status) {
            if (status === 'Boleta Confirmada') return `<span class="status-pill approved">Confirmada</span>`;
            if (status === 'Boleta rechazada') return `<span class="status-pill rejected">Rechazada</span>`;
            return `<span class="status-pill pending">Pendiente</span>`;
        }

        function removeLoader() {
            const el = document.getElementById('globalLoader');
            if (el) { 
                el.classList.add('fade-out'); 
                setTimeout(() => el.remove(), 650); 
            }
        }

        function showToast(msg, type = 'success') {
            const cont = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast';
            const iconChar = type === 'error' ? '✕' : (type === 'info' ? '→' : '✓');
            t.innerHTML = `<div class="toast-icon ${type}">${iconChar}</div><span>${msg}</span>`;
            cont.appendChild(t);
            requestAnimationFrame(() => { requestAnimationFrame(() => t.classList.add('show')); });
            setTimeout(() => { t.classList.add('hide'); setTimeout(() => t.remove(), 300); }, 3000);
        }

        // Arrancar el proceso de MSAL al cargar la página
        window.onload = init;

    </script>
</body>
</html>
